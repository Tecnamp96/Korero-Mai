document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

family:'Hanken Grotesk',sans-serif;color:#04342C;-webkit-font-smoothing:antialiased;padding:0 0 64px\">\n\n  <!-- top brand bar -->\n  <div style=\"background:#04342C;color:#fff;padding:14px 32px;display:flex;align-items:center;justify-content:space-between\">\n    <div style=\"display:flex;align-items:center;gap:11px\">\n      <div style=\"width:26px;height:26px;border-radius:7px;background:#0F6E56;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#dffaef\">K<\u002Fdiv>\n      <span style=\"font-weight:800;letter-spacing:.3px;font-size:15px\">Kōrero Mai<\u002Fspan>\n      <span style=\"color:#5DCAA5;font-size:13px;font-weight:600;margin-left:2px\">· concept for build handoff<\u002Fspan>\n    <\u002Fdiv>\n    <span style=\"font-size:12.5px;color:#9fd4c1;font-weight:600\">Citizen consultation · Aotearoa New Zealand<\u002Fspan>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1180px;margin:0 auto;padding:0 32px\">\n\n    <!-- ===== HERO ===== -->\n    <div style=\"display:flex;gap:56px;align-items:center;padding:64px 0 56px;flex-wrap:wrap\">\n      <div style=\"flex:1;min-width:380px\">\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:2px;color:#0F6E56;margin-bottom:20px\">SPEAK TO ME · SPEAK TOWARD ME<\u002Fdiv>\n        <h1 style=\"font-size:62px;line-height:1.02;font-weight:800;letter-spacing:-1.8px;margin:0 0 22px;color:#04342C\">Kōrero Mai<\u002Fh1>\n        <p style=\"font-size:20px;line-height:1.55;color:#2c4039;font-weight:500;margin:0 0 18px;max-width:540px\">A transitional way for verified New Zealand citizens to signal how they want their MPs to vote — <strong style=\"color:#0F6E56\">before parliament votes<\u002Fstrong>, not after.<\u002Fp>\n        <p style=\"font-size:15.5px;line-height:1.65;color:#52655e;margin:0 0 30px;max-width:540px\">Built for the window between Integrity New Zealand being sworn in and the Citizens' Senate being established. It produces a signal, not a mandate — and it is designed, from day one, to close.<\u002Fp>\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap\">\n          <span style=\"background:#fff;border:1px solid #cfe0d9;border-radius:24px;padding:9px 16px;font-size:13.5px;font-weight:700;color:#0a5641\">Advisory, not binding<\u002Fspan>\n          <span style=\"background:#fff;border:1px solid #cfe0d9;border-radius:24px;padding:9px 16px;font-size:13.5px;font-weight:700;color:#0a5641\">Published before the vote<\u002Fspan>\n          <span style=\"background:#fff;border:1px solid #cfe0d9;border-radius:24px;padding:9px 16px;font-size:13.5px;font-weight:700;color:#0a5641\">Built to close<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:none;display:flex;flex-direction:column;align-items:center;gap:16px\">\n        <div style=\"width:315px;height:666px\">\n          <div style=\"width:384px;height:812px;transform:scale(.82);transform-origin:top left\">\n            <dc-import name=\"Phone\" initial-screen=\"verify\" initial-bill-id=\"1\" hint-size=\"384,812\"><\u002Fdc-import>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:13px;color:#52655e;font-weight:600;text-align:center;max-width:280px;line-height:1.45\">Live prototype — verify, tap a bill, read the brief to unlock signalling, then see the public result.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== MECHANICS ===== -->\n    <div style=\"border-top:1px solid #cdd9d2;padding-top:46px\">\n      <div style=\"font-size:13px;font-weight:700;letter-spacing:1.6px;color:#0F6E56;margin-bottom:8px\">NGĀ MĀTĀPONO · WHAT MAKES IT NOT A POLL<\u002Fdiv>\n      <h2 style=\"font-size:30px;font-weight:800;letter-spacing:-.6px;margin:0 0 28px;color:#04342C\">Transparency is the architecture, not a feature<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px\">\n        <div style=\"background:#fff;border:1px solid #d9e4de;border-radius:16px;padding:22px 20px\">\n          <div style=\"width:38px;height:38px;border-radius:10px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;margin-bottom:14px\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0F6E56\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 19V6a2 2 0 0 1 2-2h6v15M4 19a2 2 0 0 0 2 2h6M12 4h6a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2h-6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"font-size:16px;font-weight:800;color:#04342C\">The reading gate<\u002Fdiv>\n          <div style=\"font-size:12px;font-weight:600;color:#0F6E56;margin:2px 0 9px\">Te tatau pānui<\u002Fdiv>\n          <p style=\"font-size:13.5px;line-height:1.55;color:#52655e;margin:0\">Signalling stays locked until you've read the independent brief. It proves the brief was read, not bypassed.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #d9e4de;border-radius:16px;padding:22px 20px\">\n          <div style=\"width:38px;height:38px;border-radius:10px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;margin-bottom:14px\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0F6E56\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 20V11M12 20V4M19 20v-7\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"font-size:16px;font-weight:800;color:#04342C\">Read vs tap, public<\u002Fdiv>\n          <div style=\"font-size:12px;font-weight:600;color:#0F6E56;margin:2px 0 9px\">Kounga whaiwāhi<\u002Fdiv>\n          <p style=\"font-size:13.5px;line-height:1.55;color:#52655e;margin:0\">Results show what share read the brief first. 58% oppose from readers is a different signal to 58% from tappers.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #d9e4de;border-radius:16px;padding:22px 20px\">\n          <div style=\"width:38px;height:38px;border-radius:10px;background:#FAEEDA;display:flex;align-items:center;justify-content:center;margin-bottom:14px\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#633806\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l9 16H3zM12 9v5M12 16.5v.5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"font-size:16px;font-weight:800;color:#04342C\">Mandatory explanation<\u002Fdiv>\n          <div style=\"font-size:12px;font-weight:600;color:#633806;margin:2px 0 9px\">Te whakamārama<\u002Fdiv>\n          <p style=\"font-size:13.5px;line-height:1.55;color:#52655e;margin:0\">If an MP votes against the signal, they file a public explanation within 24 hours — surfaced right in the app.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #d9e4de;border-radius:16px;padding:22px 20px\">\n          <div style=\"width:38px;height:38px;border-radius:10px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;margin-bottom:14px\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0F6E56\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"font-size:16px;font-weight:800;color:#04342C\">The sunset clause<\u002Fdiv>\n          <div style=\"font-size:12px;font-weight:600;color:#0F6E56;margin:2px 0 9px\">Te rā tō<\u002Fdiv>\n          <p style=\"font-size:13.5px;line-height:1.55;color:#52655e;margin:0\">A visible progress tracker toward the Citizens' Senate. When it convenes, the app closes and the archive goes public.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== FIVE SCREENS ===== -->\n    <div style=\"border-top:1px solid #cdd9d2;margin-top:52px;padding-top:46px\">\n      <div style=\"font-size:13px;font-weight:700;letter-spacing:1.6px;color:#0F6E56;margin-bottom:8px\">NGĀ MATA E RIMA · THE FIVE SCREENS<\u002Fdiv>\n      <h2 style=\"font-size:30px;font-weight:800;letter-spacing:-.6px;margin:0 0 8px;color:#04342C\">The whole flow, end to end<\u002Fh2>\n      <p style=\"font-size:15px;color:#52655e;margin:0 0 34px;max-width:620px;line-height:1.6\">Each screen below is live — tap through any of them. Verification starts the flow; the Results screen shows a real divergence case, with the MP's mandatory explanation.<\u002Fp>\n\n      <div style=\"display:flex;gap:20px;justify-content:space-between;flex-wrap:wrap\">\n\n        <div style=\"flex:none;width:205px\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:4px\"><span style=\"font-size:13px;font-weight:800;color:#0F6E56\">01<\u002Fspan><span style=\"font-size:15px;font-weight:800;color:#04342C\">Whakaū · Verify<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#52655e;line-height:1.45;margin-bottom:16px;min-height:54px\">One-time onboarding. RealMe identity matched to the electoral roll — one citizen, one signal, then anonymised.<\u002Fdiv>\n          <div style=\"width:205px;height:433px\">\n            <div style=\"width:384px;height:812px;transform:scale(.533);transform-origin:top left\">\n              <dc-import name=\"Phone\" initial-screen=\"verify\" initial-bill-id=\"1\" hint-size=\"384,812\"><\u002Fdc-import>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:none;width:205px\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:4px\"><span style=\"font-size:13px;font-weight:800;color:#0F6E56\">02<\u002Fspan><span style=\"font-size:15px;font-weight:800;color:#04342C\">Kāinga · Home<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#52655e;line-height:1.45;margin-bottom:16px;min-height:54px\">Personalised feed of bills before parliament, with days to vote and an engagement bar on each.<\u002Fdiv>\n          <div style=\"width:205px;height:433px\">\n            <div style=\"width:384px;height:812px;transform:scale(.533);transform-origin:top left\">\n              <dc-import name=\"Phone\" initial-screen=\"home\" initial-bill-id=\"1\" hint-size=\"384,812\"><\u002Fdc-import>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:none;width:205px\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:4px\"><span style=\"font-size:13px;font-weight:800;color:#0F6E56\">03<\u002Fspan><span style=\"font-size:15px;font-weight:800;color:#04342C\">Pānui · Bill<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#52655e;line-height:1.45;margin-bottom:16px;min-height:54px\">Independent plain-language brief with the reading gate. Signalling unlocks only once read.<\u002Fdiv>\n          <div style=\"width:205px;height:433px\">\n            <div style=\"width:384px;height:812px;transform:scale(.533);transform-origin:top left\">\n              <dc-import name=\"Phone\" initial-screen=\"bill\" initial-bill-id=\"1\" hint-size=\"384,812\"><\u002Fdc-import>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:none;width:205px\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:4px\"><span style=\"font-size:13px;font-weight:800;color:#0F6E56\">04<\u002Fspan><span style=\"font-size:15px;font-weight:800;color:#04342C\">Kōrero · Signal<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#52655e;line-height:1.45;margin-bottom:16px;min-height:54px\">Three bilingual options — Tautoko, Whakahē, Hiahia mōhio anō. Anonymous, published before the vote.<\u002Fdiv>\n          <div style=\"width:205px;height:433px\">\n            <div style=\"width:384px;height:812px;transform:scale(.533);transform-origin:top left\">\n              <dc-import name=\"Phone\" initial-screen=\"signal\" initial-bill-id=\"1\" hint-size=\"384,812\"><\u002Fdc-import>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:none;width:205px\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:4px\"><span style=\"font-size:13px;font-weight:800;color:#0F6E56\">05<\u002Fspan><span style=\"font-size:15px;font-weight:800;color:#04342C\">Ngā hua · Results<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#52655e;line-height:1.45;margin-bottom:16px;min-height:54px\">Signal split, engagement quality, the parliamentary vote, divergence explanation, and the sunset tracker.<\u002Fdiv>\n          <div style=\"width:205px;height:433px\">\n            <div style=\"width:384px;height:812px;transform:scale(.533);transform-origin:top left\">\n              <dc-import name=\"Phone\" initial-screen=\"results\" initial-bill-id=\"2\" hint-size=\"384,812\"><\u002Fdc-import>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== IS / ISN'T ===== -->\n    <div style=\"border-top:1px solid #cdd9d2;margin-top:52px;padding-top:46px;display:grid;grid-template-columns:1fr 1fr;gap:28px\">\n      <div style=\"background:#04342C;border-radius:18px;padding:28px 30px;color:#dff1ea\">\n        <div style=\"font-size:13px;font-weight:800;letter-spacing:.5px;color:#5DCAA5;margin-bottom:16px\">HE AHA TĒNEI · WHAT IT IS<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:13px\">\n          <div style=\"display:flex;gap:11px;font-size:14.5px;line-height:1.45\"><span style=\"color:#5DCAA5;font-weight:800\">✓<\u002Fspan><span>A verified, electoral-roll-matched signal from any NZ citizen<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:11px;font-size:14.5px;line-height:1.45\"><span style=\"color:#5DCAA5;font-weight:800\">✓<\u002Fspan><span>Published before INZ casts its parliamentary vote<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:11px;font-size:14.5px;line-height:1.45\"><span style=\"color:#5DCAA5;font-weight:800\">✓<\u002Fspan><span>A transitional bridge to the Citizens' Senate<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #d9e4de;border-radius:18px;padding:28px 30px;color:#2c4039\">\n        <div style=\"font-size:13px;font-weight:800;letter-spacing:.5px;color:#A32D2D;margin-bottom:16px\">EHARA I TĒNEI · WHAT IT IS NOT<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:13px\">\n          <div style=\"display:flex;gap:11px;font-size:14.5px;line-height:1.45\"><span style=\"color:#A32D2D;font-weight:800\">✕<\u002Fspan><span>Not a binding mandate — it informs and pressures, it doesn't direct<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:11px;font-size:14.5px;line-height:1.45\"><span style=\"color:#A32D2D;font-weight:800\">✕<\u002Fspan><span>Not an INZ membership tool — open to all verified citizens<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:11px;font-size:14.5px;line-height:1.45\"><span style=\"color:#A32D2D;font-weight:800\">✕<\u002Fspan><span>Not permanent — it closes when the Senate is established<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"text-align:center;margin-top:44px;font-size:12.5px;color:#7d918b;line-height:1.5\">Concept prototype for build handoff · fictional bills and figures · te reo Māori as primary text by design<\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
